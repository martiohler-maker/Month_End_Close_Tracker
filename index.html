<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Month-End Close Tracker</title>
<style>
  :root {
    --paper: #f6f7f1;
    --stripe: #eaedde;
    --card: #ffffff;
    --ink: #1c2b22;
    --ink-muted: #5c6b5a;
    --rule: #d3d8c7;
    --accent: #2d4468;
    --accent-soft: #dbe3ee;
    --done: #2f7a4f;
    --done-bg: #dcefe0;
    --prog: #b5791a;
    --prog-bg: #f4e6c8;
    --blocked: #a13d2e;
    --blocked-bg: #f6dbd3;
    --shadow: 0 1px 2px rgba(28, 43, 34, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #14170f;
      --stripe: #1c2016;
      --card: #1a1e14;
      --ink: #eef0e6;
      --ink-muted: #97a48f;
      --rule: #2d3324;
      --accent: #8fb0dd;
      --accent-soft: #263349;
      --done: #6fcf8f;
      --done-bg: #16351f;
      --prog: #e3b45c;
      --prog-bg: #3a2c11;
      --blocked: #e28d7d;
      --blocked-bg: #3a1c16;
      --shadow: none;
    }
  }
  :root[data-theme="dark"] {
    --paper: #14170f;
    --stripe: #1c2016;
    --card: #1a1e14;
    --ink: #eef0e6;
    --ink-muted: #97a48f;
    --rule: #2d3324;
    --accent: #8fb0dd;
    --accent-soft: #263349;
    --done: #6fcf8f;
    --done-bg: #16351f;
    --prog: #e3b45c;
    --prog-bg: #3a2c11;
    --blocked: #e28d7d;
    --blocked-bg: #3a1c16;
    --shadow: none;
  }
  :root[data-theme="light"] {
    --paper: #f6f7f1;
    --stripe: #eaedde;
    --card: #ffffff;
    --ink: #1c2b22;
    --ink-muted: #5c6b5a;
    --rule: #d3d8c7;
    --accent: #2d4468;
    --accent-soft: #dbe3ee;
    --done: #2f7a4f;
    --done-bg: #dcefe0;
    --prog: #b5791a;
    --prog-bg: #f4e6c8;
    --blocked: #a13d2e;
    --blocked-bg: #f6dbd3;
    --shadow: 0 1px 2px rgba(28, 43, 34, 0.06);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
  }
  body {
    padding: 40px 18px 70px;
    display: flex;
    justify-content: center;
  }
  .serif {
    font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, ui-serif, serif;
  }
  .mono {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-variant-numeric: tabular-nums;
  }
  .wrap {
    width: 100%;
    max-width: 640px;
  }

  header {
    margin-bottom: 22px;
  }
  .eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--accent);
  }
  h1 {
    font-size: 2rem;
    font-weight: 600;
    margin: 4px 0 2px;
    text-wrap: balance;
    letter-spacing: -0.01em;
  }
  .period {
    color: var(--ink-muted);
    font-size: 0.92rem;
  }
  .period .mono { color: var(--ink-muted); }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 4px;
    margin: 20px 0 22px;
    box-shadow: var(--shadow);
  }
  .tab-btn {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--ink-muted);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .tab-btn.active {
    background: var(--accent);
    color: var(--paper);
  }
  .tab-btn:focus-visible, .status-btn:focus-visible, .reset-btn:focus-visible, .note-field input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 6px 16px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card.pad { padding: 18px 16px; }

  .task-row {
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
  }
  .task-row:nth-child(odd) { background: transparent; }
  .task-row:last-child { border-bottom: none; }
  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 9px;
  }
  .task-name {
    font-weight: 600;
    font-size: 0.98rem;
  }
  .task-owner {
    color: var(--ink-muted);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .status-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .status-btn {
    flex: 1;
    min-width: 92px;
    padding: 7px 10px;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--ink);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .status-btn[data-status="done"].active {
    background: var(--done-bg); border-color: var(--done); color: var(--done);
  }
  .status-btn[data-status="in_progress"].active {
    background: var(--prog-bg); border-color: var(--prog); color: var(--prog);
  }
  .status-btn[data-status="blocked"].active {
    background: var(--blocked-bg); border-color: var(--blocked); color: var(--blocked);
  }
  .note-field { margin-top: 9px; }
  .note-field label {
    display: block;
    font-size: 0.72rem;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }
  .note-field input {
    width: 100%;
    padding: 8px 10px;
    border-radius: 7px;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    font-size: 0.82rem;
    font-family: inherit;
  }

  /* ---- Status view ---- */
  .stamp-banner {
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .stamp-banner.locked { background: var(--blocked-bg); border: 1px solid var(--blocked); }
  .stamp-banner.ready  { background: var(--done-bg); border: 1px solid var(--done); }

  .stamp {
    flex: none;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 3px double currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transform: rotate(-8deg);
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, ui-serif, serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.05;
    font-size: 0.62rem;
    padding: 4px;
  }
  .stamp-banner.locked .stamp { color: var(--blocked); }
  .stamp-banner.ready .stamp { color: var(--done); }

  .stamp-title {
    font-weight: 700;
    font-size: 1.05rem;
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, ui-serif, serif;
  }
  .stamp-banner.locked .stamp-title { color: var(--blocked); }
  .stamp-banner.ready .stamp-title { color: var(--done); }
  .stamp-sub {
    font-size: 0.84rem;
    color: var(--ink-muted);
    margin-top: 2px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    padding-top: 4px;
  }
  .stat-row .big {
    font-size: 1.7rem;
    font-weight: 700;
  }
  .stat-row .pct {
    font-size: 1.1rem;
    color: var(--ink-muted);
  }
  .progress-track {
    height: 14px;
    background: var(--stripe);
    border-radius: 7px;
    overflow: hidden;
    display: flex;
    gap: 1px;
  }
  .progress-seg { height: 100%; }
  .progress-seg.done { background: var(--done); }
  .progress-seg.in_progress { background: var(--prog); }
  .progress-seg.blocked { background: var(--blocked); }

  .chip-row {
    display: flex;
    gap: 8px;
    margin-top: 13px;
    flex-wrap: wrap;
    padding-bottom: 14px;
  }
  .chip {
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 0.76rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; }
  .chip.done { background: var(--done-bg); color: var(--done); }
  .chip.done .dot { background: var(--done); }
  .chip.in_progress { background: var(--prog-bg); color: var(--prog); }
  .chip.in_progress .dot { background: var(--prog); }
  .chip.blocked { background: var(--blocked-bg); color: var(--blocked); }
  .chip.blocked .dot { background: var(--blocked); }

  .card h2 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    margin: 16px 0 4px;
    font-weight: 700;
    font-family: inherit;
  }
  .block-item {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
  }
  .block-item:last-child { border-bottom: none; }
  .block-name { font-weight: 600; font-size: 0.92rem; }
  .block-owner { color: var(--accent); font-size: 0.8rem; margin-top: 3px; font-weight: 600; }
  .block-note { color: var(--ink-muted); font-size: 0.8rem; margin-top: 2px; }
  .block-badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
    height: fit-content;
  }
  .block-badge.in_progress { background: var(--prog-bg); color: var(--prog); }
  .block-badge.blocked { background: var(--blocked-bg); color: var(--blocked); }
  .empty-note {
    color: var(--ink-muted);
    font-size: 0.88rem;
    padding: 14px 0 18px;
  }

  footer {
    text-align: center;
    margin-top: 22px;
  }
  .reset-btn {
    background: none;
    border: none;
    color: var(--ink-muted);
    font-size: 0.76rem;
    text-decoration: underline;
    cursor: pointer;
    font-family: inherit;
  }

  @media (prefers-reduced-motion: no-preference) {
    .progress-seg { transition: flex-basis 0.25s ease; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Month-End Close</div>
    <h1 class="serif">Close Tracker</h1>
    <div class="period">Period: <span class="mono" id="periodLabel"></span></div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-view="checklist">Checklist</button>
    <button class="tab-btn" data-view="status">Status</button>
  </div>

  <div id="checklistView"></div>
  <div id="statusView" style="display:none;"></div>

  <footer>
    <button class="reset-btn" id="resetBtn">Reset to sample close</button>
  </footer>
</div>

<script>
  const STORAGE_KEY = 'monthEndCloseTracker.v1';

  const SAMPLE_TASKS = [
    { id: 't1', name: 'Reconcile all bank accounts', owner: 'Treasury', status: 'done', note: '' },
    { id: 't2', name: 'Post payroll accrual', owner: 'HR / Payroll', status: 'done', note: '' },
    { id: 't3', name: 'Reconcile AP subledger to GL', owner: 'AP Team', status: 'done', note: '' },
    { id: 't4', name: 'Reconcile AR subledger to GL', owner: 'AR Team', status: 'in_progress', note: '' },
    { id: 't5', name: 'Post depreciation & amortization', owner: 'Fixed Assets', status: 'done', note: '' },
    { id: 't6', name: 'Review and post other accrual entries', owner: 'Controller', status: 'in_progress', note: '' },
    { id: 't7', name: 'Reconcile intercompany balances', owner: 'Consolidations', status: 'blocked', note: 'Waiting on EU entity trial balance' },
    { id: 't8', name: 'Post revenue recognition adjustments', owner: 'Revenue Accounting', status: 'done', note: '' },
    { id: 't9', name: 'Review fixed asset additions/disposals', owner: 'Fixed Assets', status: 'done', note: '' },
    { id: 't10', name: 'Prepare flux / variance analysis', owner: 'FP&A', status: 'in_progress', note: '' },
    { id: 't11', name: 'Reconcile prepaid expenses', owner: 'Controller', status: 'blocked', note: 'Missing invoice detail from IT vendor' },
    { id: 't12', name: 'Finalize trial balance & lock GL', owner: 'Controller', status: 'blocked', note: 'Cannot lock until all subledgers reconcile' },
    { id: 't13', name: 'Reconcile credit card statements', owner: 'AP Team', status: 'done', note: '' },
    { id: 't14', name: 'Calculate debt covenants', owner: 'Treasury', status: 'blocked', note: 'Waiting on updated debt schedule from lender' },
    { id: 't15', name: 'Prepare variance analysis commentary', owner: 'FP&A', status: 'in_progress', note: '' },
  ];

  const SAMPLE_PERIOD = 'June 2026';

  const STATUS_LABEL = { done: 'Done', in_progress: 'In progress', blocked: 'Blocked' };

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* fall through to sample */ }
    return { period: SAMPLE_PERIOD, tasks: SAMPLE_TASKS.map(t => ({ ...t })) };
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = loadState();
  let currentView = 'checklist';

  // Only a direct user click on a status button changes a task's status.
  // No code path here ever sets status to 'done' automatically.
  function setStatus(taskId, newStatus) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    task.status = newStatus;
    saveState();
    render();
  }

  function setNote(taskId, value) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    task.note = value;
    saveState();
  }

  function renderChecklist() {
    const el = document.getElementById('checklistView');
    const rows = state.tasks.map(task => {
      const statuses = ['done', 'in_progress', 'blocked'];
      const btns = statuses.map(s => `
        <button class="status-btn${task.status === s ? ' active' : ''}" data-status="${s}" data-task="${task.id}">
          ${STATUS_LABEL[s]}
        </button>
      `).join('');
      const noteField = task.status === 'blocked' ? `
        <div class="note-field">
          <label for="note-${task.id}">Why is this blocked?</label>
          <input type="text" id="note-${task.id}" data-task="${task.id}" value="${escapeAttr(task.note || '')}" placeholder="e.g. waiting on data from another team">
        </div>
      ` : '';
      return `
        <div class="task-row">
          <div class="task-top">
            <div class="task-name">${escapeHtml(task.name)}</div>
            <div class="task-owner mono">${escapeHtml(task.owner)}</div>
          </div>
          <div class="status-group">${btns}</div>
          ${noteField}
        </div>
      `;
    }).join('');

    el.innerHTML = `<div class="card">${rows}</div>`;

    el.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', () => setStatus(btn.dataset.task, btn.dataset.status));
    });
    el.querySelectorAll('.note-field input').forEach(input => {
      input.addEventListener('input', () => setNote(input.dataset.task, input.value));
    });
  }

  function renderStatus() {
    const el = document.getElementById('statusView');
    const total = state.tasks.length;
    const doneCount = state.tasks.filter(t => t.status === 'done').length;
    const inProgressCount = state.tasks.filter(t => t.status === 'in_progress').length;
    const blockedCount = state.tasks.filter(t => t.status === 'blocked').length;
    const pct = total === 0 ? 0 : Math.round((doneCount / total) * 100);
    const allDone = total > 0 && doneCount === total;

    const seg = (count) => total === 0 ? 0 : (count / total) * 100;

    const blockers = state.tasks.filter(t => t.status !== 'done');
    const blockersHtml = blockers.length === 0
      ? `<div class="empty-note">Nothing is blocking sign-off.</div>`
      : blockers.map(t => `
          <div class="block-item">
            <div>
              <div class="block-name">${escapeHtml(t.name)}</div>
              <div class="block-owner">Chase: ${escapeHtml(t.owner)}</div>
              ${t.status === 'blocked' && t.note ? `<div class="block-note">${escapeHtml(t.note)}</div>` : ''}
            </div>
            <div class="block-badge ${t.status}">${STATUS_LABEL[t.status]}</div>
          </div>
        `).join('');

    const bannerClass = allDone ? 'ready' : 'locked';
    const stampText = allDone ? 'Signed Off' : 'Locked';
    const bannerTitle = allDone ? 'Ready to sign off' : 'Sign-off locked';
    const bannerSub = allDone
      ? 'All close tasks are done.'
      : `${total - doneCount} of ${total} task${total - doneCount === 1 ? '' : 's'} still need${total - doneCount === 1 ? 's' : ''} to be marked Done.`;

    el.innerHTML = `
      <div class="stamp-banner ${bannerClass}">
        <div class="stamp">${stampText}</div>
        <div>
          <div class="stamp-title">${bannerTitle}</div>
          <div class="stamp-sub">${bannerSub}</div>
        </div>
      </div>

      <div class="card pad">
        <div class="stat-row">
          <div class="big mono">${doneCount} / ${total} <span style="font-size:0.6em; font-weight:500; color:var(--ink-muted);">done</span></div>
          <div class="pct mono">${pct}%</div>
        </div>
        <div class="progress-track">
          <div class="progress-seg done" style="flex-basis:${seg(doneCount)}%;"></div>
          <div class="progress-seg in_progress" style="flex-basis:${seg(inProgressCount)}%;"></div>
          <div class="progress-seg blocked" style="flex-basis:${seg(blockedCount)}%;"></div>
        </div>
        <div class="chip-row">
          <div class="chip done"><span class="dot"></span>${doneCount} Done</div>
          <div class="chip in_progress"><span class="dot"></span>${inProgressCount} In progress</div>
          <div class="chip blocked"><span class="dot"></span>${blockedCount} Blocked</div>
        </div>
      </div>

      <div class="card">
        <h2>Blocking sign-off</h2>
        ${blockersHtml}
      </div>
    `;
  }

  function render() {
    document.getElementById('periodLabel').textContent = state.period;
    if (currentView === 'checklist') {
      document.getElementById('checklistView').style.display = '';
      document.getElementById('statusView').style.display = 'none';
      renderChecklist();
    } else {
      document.getElementById('checklistView').style.display = 'none';
      document.getElementById('statusView').style.display = '';
      renderStatus();
    }
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }
  function escapeAttr(str) { return escapeHtml(str); }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('Reset all tasks back to the sample close data? This will overwrite your current progress.')) return;
    state = { period: SAMPLE_PERIOD, tasks: SAMPLE_TASKS.map(t => ({ ...t })) };
    saveState();
    render();
  });

  render();
</script>
</body>
</html>
